<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBarter Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        header {
            position: relative;
            text-align: center;
            padding: 50px;
            background: linear-gradient(45deg, #18337c, #05387a, #173068); /* Base gradient */
            background-size: 400% 400%;
            animation: gradientAnimation 5s ease infinite; /* Animation applied here */
            color: white;
            z-index: 10;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 600;
            animation: fadeIn 2s ease-in-out;
        }

        /* Add the background image */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            filter: brightness(50%);
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        nav ul li a:hover {
            color: #13aae6;
            transform: scale(1.1);
        }

        main {
            padding: 20px;
            text-align: center;
            color: #333;
        }

        main h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        main p {
            font-size: 1.2rem;
            margin: 0 auto;
            width: 70%;
            max-width: 800px;
        }

        .statistics {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
        }

        .statistics div {
            background-color: #040c3a;
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
            font-size: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .statistics div:hover {
            transform: scale(1.05);
        }

        footer {
            background-color: #0c2b81;
            color: white;
            text-align: center;
            padding: 15px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        footer p {
            margin: 0;
            font-size: 1rem;
        }

        /* Keyframes for the gradient animation */
        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Keyframes for fadeIn animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

    </style>
</head>
<body>
    <header>
        <h1>Welcome to SmartBarter Hub</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('register') }}">Register</a></li>
                <li><a href="{{ url_for('view_listings') }}">View Listings</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <img src="{{ url_for('static', filename='images/nust.jpeg') }}" alt="NUST Campus" class="background-image">
        
        <section>
            <h2>What is SmartBarter Hub?</h2>
            <p>A platform to exchange tech items and skills exclusively for NUST H-12 students.</p>
        </section>

        <!-- Fun statistics section -->
        <div class="statistics">
            <div>
                <p><i class="fas fa-cogs"></i></p>
                <h3>50+</h3>
                <p>Items Exchanged</p>
            </div>
            <div>
                <p><i class="fas fa-users"></i></p>
                <h3>100+</h3>
                <p>Active Users</p>
            </div>
            <div>
                <p><i class="fas fa-clock"></i></p>
                <h3>24/7</h3>
                <p>Available Listings</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 SmartBarter Hub | All rights reserved.</p>
    </footer>
</body>
</html>
